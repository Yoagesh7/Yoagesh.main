<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Waitlist | PartnerAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-primary-container { background-color: #4a3f7a; }
        .text-primary-container { color: #4a3f7a; }
        input, select { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus, select:focus { border-color: #4a3f7a !important; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full glass-panel p-8 md:p-10 rounded-[2rem] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 bg-[#4a3f7a] opacity-20 blur-3xl rounded-full"></div>
        
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-white transition-colors mb-6">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Home
            </a>
            <h1 class="text-3xl font-bold mb-2">Join the Waitlist</h1>
            <p class="text-zinc-400">Secure your spot for the next generation of AI-driven productivity.</p>
        </div>

        <form id="waitlistForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-2">Full Name</label>
                <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl" placeholder="john@example.com">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Age Range</label>
                    <select id="age" required class="w-full px-4 py-3 rounded-xl">
                        <option value="">Select</option>
                        <option value="18-24">18-24</option>
                        <option value="25-34">25-34</option>
                        <option value="35-44">35-44</option>
                        <option value="45+">45+</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Profession</label>
                    <select id="profession" required class="w-full px-4 py-3 rounded-xl">
                        <option value="">Select</option>
                        <option value="Founder">Founder</option>
                        <option value="Developer">Developer</option>
                        <option value="Designer">Designer</option>
                        <option value="Manager">Manager</option>
                        <option value="Student">Student</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full bg-primary-container text-white py-4 rounded-xl font-bold hover:shadow-[0_0_40px_rgba(74,63,122,0.4)] transition-all duration-300 transform hover:scale-[1.02] active:scale-95">
                Reserve My Spot
            </button>
        </form>

        <div id="successMessage" class="hidden text-center py-8">
            <span class="material-symbols-outlined text-green-500 text-6xl mb-4">check_circle</span>
            <h2 class="text-2xl font-bold mb-2">You're on the list!</h2>
            <p class="text-zinc-400 mb-6">We'll reach out to you as soon as early access is available.</p>
            <a href="index.html" class="bg-white/5 border border-white/10 text-white px-6 py-2 rounded-lg hover:bg-white/10 transition-colors">Back to Home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('waitlistForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: document.getElementById('age').value,
                profession: document.getElementById('profession').value,
                date: new Date().toLocaleString()
            };

            // Save to localStorage
            let waitlist = JSON.parse(localStorage.getItem('partnerai_waitlist') || '[]');
            waitlist.push(userData);
            localStorage.setItem('partnerai_waitlist', JSON.stringify(waitlist));

            form.classList.add('hidden');
            successMessage.classList.remove('hidden');
        });
    </script>
</body>
</html>
